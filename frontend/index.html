<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>STOCKFLOW</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg: #ffffff;
      --bg2: #f7f7f8;
      --text: #0d0d0d;
      --text2: #6e6e80;
      --border: rgba(0,0,0,0.12);
      --radius: 12px;
    }
    
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #212121;
        --bg2: #2f2f2f;
        --text: #ececec;
        --text2: #8e8ea0;
        --border: rgba(255,255,255,0.1);
      }
    }
    
    body {
      font-family: -apple-system, "Söhne", ui-sans-serif, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* ─── Top bar ─── */
    #topbar {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #topbar h1 { font-size: 15px; font-weight: 500; }
    #topbar span { font-size: 12px; color: var(--text2); }
    
    /* ─── Messages ─── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    
    .msg-row {
      display: flex;
      justify-content: center;
      padding: 4px 24px;
    }
    
    .msg-inner {
      width: 100%;
      max-width: 680px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }
    
    .msg-row.user .msg-inner { flex-direction: row-reverse; }
    
    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .avatar.ai { background: var(--text); color: var(--bg); }
    .avatar.user { background: var(--border); color: var(--text2); }
    
    .bubble {
      max-width: calc(100% - 44px);
      padding: 10px 0;
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
    }
    
    .bubble.user {
      background: var(--bg2);
      padding: 10px 16px;
      border-radius: 18px;
      font-size: 15px;
    }
    
    /* Markdown inside AI bubble */
    .bubble.ai h2 { font-size: 15px; font-weight: 500; margin: 16px 0 6px; }
    .bubble.ai h3 { font-size: 14px; font-weight: 500; margin: 14px 0 4px; color: var(--text2); }
    .bubble.ai p { margin: 6px 0; }
    .bubble.ai ul, .bubble.ai ol { padding-left: 20px; margin: 6px 0; }
    .bubble.ai li { margin: 3px 0; }
    .bubble.ai strong { font-weight: 500; }
    .bubble.ai hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
    .bubble.ai blockquote {
      border-left: 3px solid var(--border);
      padding-left: 12px;
      color: var(--text2);
      margin: 8px 0;
    }
    .bubble.ai table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin: 8px 0;
    }
    .bubble.ai th {
      text-align: left;
      font-weight: 500;
      border-bottom: 1px solid var(--border);
      padding: 6px 10px;
      color: var(--text2);
      font-size: 12px;
    }
    .bubble.ai td {
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    
    /* ─── Typing indicator ─── */
    .typing { display: flex; gap: 4px; align-items: center; padding: 10px 0; }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text2);
      animation: pulse 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes pulse { 0%,60%,100%{opacity:0.3} 30%{opacity:1} }
    
    /* ─── Welcome ─── */
    #welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
      gap: 10px;
    }
    #welcome h2 { font-size: 24px; font-weight: 500; }
    #welcome p { font-size: 14px; color: var(--text2); max-width: 340px; }
    .quick-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 20px;
      width: 100%;
      max-width: 360px;
    }
    .qcard {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s;
      font-family: inherit;
      color: var(--text);
    }
    .qcard:hover { border-color: var(--text); }
    .qcard b { display: block; font-size: 14px; font-weight: 500; }
    .qcard small { font-size: 12px; color: var(--text2); }
    
    /* ─── Input area ─── */
    #inputwrap {
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      padding: 16px 24px 24px;
      border-top: 1px solid var(--border);
    }
    
    #inputbox {
      width: 100%;
      max-width: 680px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 10px 14px;
      transition: border-color 0.15s;
    }
    #inputbox:focus-within { border-color: var(--text); }
    
    #ticker {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-size: 15px;
      color: var(--text);
      font-family: inherit;
    }
    #ticker::placeholder { color: var(--text2); }
    
    #sendbtn {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--text);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    #sendbtn:hover { opacity: 0.75; }
    #sendbtn:disabled { opacity: 0.3; cursor: not-allowed; }
    #sendbtn svg { fill: var(--bg); }
  </style>
</head>
<body>

<div id="topbar">
  <h1>STOCKFLOW</h1>
</div>

<div id="messages">
  <div id="welcome">
    <h2>STOCKFLOW</h2>
    <p>Type a stock name and get a report made by STOCKFLOW</p>
    <div class="quick-grid">
      <button class="qcard" onclick="send('AAPL')"><b>AAPL</b><small>Apple Inc.</small></button>
      <button class="qcard" onclick="send('NVDA')"><b>NVDA</b><small>Nvidia Corp.</small></button>
      <button class="qcard" onclick="send('TSLA')"><b>TSLA</b><small>Tesla Inc.</small></button>
      <button class="qcard" onclick="send('MSFT')"><b>MSFT</b><small>Microsoft</small></button>
    </div>
  </div>
</div>

<div id="inputwrap">
  <div id="inputbox">
    <input id="ticker" type="text" placeholder="Enter a ticker (e.g. AAPL, TSLA, NVDA)..."
           maxlength="20" onkeydown="if(event.key==='Enter')send()" autocomplete="off" />
    <button id="sendbtn" onclick="send()">
      <svg width="14" height="14" viewBox="0 0 14 14">
        <path d="M1 7h12M7 1l6 6-6 6" stroke="var(--bg)"
              stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </button>
  </div>
</div>

<script>
const msgArea = document.getElementById('messages');
const input   = document.getElementById('ticker');
const btn     = document.getElementById('sendbtn');
let loading   = false;

input.addEventListener('input', () => {
  input.value = input.value.toUpperCase().replace(/[^A-Z0-9.]/g, '');
});

function addRow(content, isUser) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const row = document.createElement('div');
  row.className = 'msg-row' + (isUser ? ' user' : '');
  
  const inner = document.createElement('div');
  inner.className = 'msg-inner';
  
  const av = document.createElement('div');
  av.className = 'avatar ' + (isUser ? 'user' : 'ai');
  av.textContent = isUser ? 'You' : 'AI';
  
  const bub = document.createElement('div');
  bub.className = 'bubble ' + (isUser ? 'user' : 'ai');
  if (isUser) bub.textContent = content;
  else bub.innerHTML = content;
  
  inner.appendChild(av);
  inner.appendChild(bub);
  row.appendChild(inner);
  msgArea.appendChild(row);
  msgArea.scrollTop = msgArea.scrollHeight;
  return bub;
}

async function send(ticker) {
  const val = (ticker || input.value).trim().toUpperCase().replace(/[^A-Z0-9.]/g,'');
  if (!val || loading) return;
  
  input.value = '';
  loading = true;
  btn.disabled = true;
  
  addRow('Analyze ' + val, true);
  
  const aiBub = addRow('<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>', false);
  
  let buffer = '';
  aiBub.innerHTML = '<span style="font-size:13px;color:var(--text2)">Fetching data for ' + val + '...</span>';
  
  try {
    const res = await fetch('/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticker: val })
    });
    
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let started = false;
    
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      
      const chunk = decoder.decode(value);
      const lines = chunk.split('\n');
      
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6).trim();
          if (data === '[DONE]') break;
          
          if (!started) {
            aiBub.innerHTML = '';
            started = true;
          }
          
          let text = data;
          try { 
            const parsed = JSON.parse(data);
            text = parsed.content || parsed.text || parsed.message || parsed;
          } catch(e) {
            // Not JSON, use raw data
          }
          
          buffer += text + ' ';
          aiBub.innerHTML = marked.parse(buffer);
          msgArea.scrollTop = msgArea.scrollHeight;
        }
      }
    }
  } catch(e) {
    aiBub.textContent = 'Error: ' + e.message;
  }
  
  loading = false;
  btn.disabled = false;
}
</script>
</body>
</html>
